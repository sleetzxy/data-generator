server:
  port: 8080

data-generator:
  config-dir: ./configs
  connections:
    dev-pg:
      type: postgresql
      url: jdbc:postgresql://localhost:5432/dev
      username: test
      password: test
    dev-ch:
      type: clickhouse
      url: jdbc:clickhouse://localhost:8123/analytics
    local-csv:
      type: csv
      path: ./output
  job:
    sync-threshold: 5000
    batch-size: 1000
    thread-pool-size: 4
