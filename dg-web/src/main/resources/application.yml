server:
  port: 8080

spring:
  config:
    import: optional:classpath:application-local.yml

data-generator:
  config-dir: classpath:configs
  writable-config-dir: ./data/configs
  auth:
    enabled: true
    username: admin
    password: admin123
  connections:
    dev-safety:
      type: postgresql
      url: jdbc:postgresql://localhost:5432/safety
      username: postgres
      password: changeme
    dev-road:
      type: postgresql
      url: jdbc:postgresql://localhost:5432/road
      username: postgres
      password: changeme
    dev-ch:
      type: clickhouse
      url: jdbc:clickhouse://localhost:8123/analytics
    local-csv:
      type: csv
      path: ./output
    traffic-output:
      type: csv
      path: ./output/traffic
  job:
    sync-threshold: 5000
    batch-size: 1000
    thread-pool-size: 4
    generation-parallelism: 0
  storage:
    sqlite-path: ./data/dg-jobs.db
    log-dir: ./data/job-logs
  ai:
    enabled: true
    remote-base-url: http://localhost:8081
    request-timeout: 120s
  service-auth:
    token: ${DG_SERVICE_AUTH_TOKEN:ai-tokens}
