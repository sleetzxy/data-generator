<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Generator 控制台</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="tasks-page">
<header class="header">
    <div class="header-inner header-with-nav">
        <div>
            <h1>Data Generator</h1>
            <p class="subtitle">测试数据生成任务管理</p>
        </div>
        <nav class="header-nav">
            <a href="/" class="nav-link active">任务管理</a>
            <a href="/docs.html" class="nav-link">配置指南</a>
            <form class="logout-form" action="/api/v1/auth/logout" method="post">
                <button type="submit" class="btn-logout">退出</button>
            </form>
        </nav>
    </div>
</header>

<main class="container">
    <section class="panel">
        <div class="toolbar">
            <button id="btn-new-definition" class="btn primary">新建任务</button>
            <button id="btn-refresh-definitions" class="btn">刷新</button>
            <label class="auto-refresh-toggle">
                <input type="checkbox" id="auto-refresh-toggle" checked>
                <span>自动刷新</span>
            </label>
        </div>
        <div class="table-wrap definitions-table-wrap scrollbar-overlay">
            <table class="definitions-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>名称</th>
                    <th>类型</th>
                    <th>Cron</th>
                    <th>最近状态</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody id="definitions-body"></tbody>
            </table>
        </div>
        <div id="definitions-pagination" class="pagination hidden"></div>
    </section>
</main>

<div id="modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modal-title">编辑任务</h2>
            <button id="modal-close" class="icon-btn" aria-label="关闭">&times;</button>
        </div>
        <div class="modal-body scrollbar-overlay">
            <label id="name-field" class="field">
                <span>任务名称</span>
                <input type="text" id="definition-name" placeholder="例如 我的测试任务">
            </label>
            <label class="field">
                <span>YAML 内容</span>
                <textarea id="definition-content" rows="14" spellcheck="false"></textarea>
            </label>
            <div id="schedule-fields" class="schedule-fields">
                <h3 class="section-title">定时调度</h3>
                <label class="field">
                    <span>启用定时调度</span>
                    <div class="field-control field-control-checkbox">
                        <input type="checkbox" id="definition-schedule-enabled">
                        <span class="checkbox-caption">开启后按 Cron 自动执行</span>
                    </div>
                </label>
                <label class="field">
                    <span>Cron 表达式</span>
                    <input type="text" id="definition-schedule-cron" placeholder="0 0 2 * * ?" spellcheck="false">
                    <small class="field-hint">Spring 6 字段格式：秒 分 时 日 月 周</small>
                </label>
                <label class="field" id="definition-next-run-field">
                    <span>下次执行</span>
                    <div id="definition-schedule-next-run" class="field-readonly">—</div>
                </label>
            </div>
        </div>
        <div class="modal-footer">
            <button id="modal-cancel" class="btn">取消</button>
            <button id="modal-save" class="btn primary">保存</button>
        </div>
    </div>
</div>

<div id="preview-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content modal-xwide">
        <div class="modal-header">
            <h2 id="preview-title">数据预览</h2>
            <button id="preview-close" class="icon-btn" aria-label="关闭">&times;</button>
        </div>
        <div class="modal-body preview-modal-body scrollbar-overlay">
            <div id="preview-content" class="preview-content"></div>
            <div id="preview-pagination" class="pagination hidden"></div>
        </div>
    </div>
</div>

<div id="log-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content modal-wide">
        <div class="modal-header">
            <h2 id="log-title">运行记录</h2>
            <button id="log-close" class="icon-btn" aria-label="关闭">&times;</button>
        </div>
        <div class="modal-body scrollbar-overlay">
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>任务 ID</th>
                        <th>状态</th>
                        <th>提交时间</th>
                        <th>耗时</th>
                        <th>写入行数</th>
                    </tr>
                    </thead>
                    <tbody id="log-runs-body"></tbody>
                </table>
            </div>
            <div id="log-pagination" class="pagination hidden"></div>
        </div>
    </div>
</div>

<div id="toast" class="toast hidden"></div>

<button id="ai-fab" class="ai-fab hidden" type="button"
        aria-label="AI Agent，可拖动">
    <svg class="ai-fab-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path fill="currentColor" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09z" opacity="0.95"/>
        <path fill="currentColor" d="M18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 0 0 2.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 0 0-2.456 2.456z"/>
        <path fill="currentColor" d="M16.894 20.567L16.5 21.75l-.394-1.183a2.25 2.25 0 0 0-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 0 0 1.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 0 0 1.423 1.423l1.183.394-1.183.394a2.25 2.25 0 0 0-1.423 1.423z"/>
    </svg>
</button>
<aside id="ai-drawer" class="ai-drawer hidden" aria-label="AI Agent">
    <header class="ai-drawer-header">
        <h2>AI Agent</h2>
        <div class="ai-drawer-header-actions">
            <button id="ai-end-session" type="button" class="ai-header-link">新对话</button>
            <button id="ai-drawer-close" class="icon-btn" type="button" aria-label="关闭">&times;</button>
        </div>
    </header>
    <div class="ai-drawer-body">
        <div id="ai-messages" class="ai-messages scrollbar-overlay"></div>
        <div class="ai-composer">
            <form id="ai-chat-form" class="ai-composer-form">
                <textarea id="ai-input" rows="1" spellcheck="false"
                          placeholder="想到什么就随时发…"></textarea>
                <div class="ai-composer-toolbar">
                    <div class="ai-composer-left">
                        <label class="ai-think-toggle" title="开启后显示推理过程">
                            <input type="checkbox" id="ai-think-toggle">
                            <span class="ai-think-slider"></span>
                            <span class="ai-think-label">深度思考</span>
                        </label>
                    </div>
                    <div class="ai-composer-right ai-composer-right-only">
                        <button type="submit" id="ai-send-btn" class="ai-send-btn" aria-label="发送" disabled>
                            <svg class="ai-send-icon" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
                                <path fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                                      stroke-linejoin="round" d="M12 19V5M12 5l-5 5M12 5l5 5"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</aside>

<script src="/csrf.js"></script>
<script src="/scrollbar.js"></script>
<script src="/app.js"></script>
<script src="/agent.js"></script>
</body>
</html>
