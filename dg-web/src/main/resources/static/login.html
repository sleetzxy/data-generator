<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Data Generator</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="login-page">
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-brand">
            <h1>Data Generator</h1>
            <p>测试数据生成控制台</p>
        </div>
        <form class="login-form" method="post" action="/api/v1/auth/login">
            <label class="field">
                <span>用户名</span>
                <input type="text" name="username" autocomplete="username" required autofocus>
            </label>
            <label class="field">
                <span>密码</span>
                <input type="password" name="password" autocomplete="current-password" required>
            </label>
            <p id="login-message" class="login-message hidden"></p>
            <button type="submit" class="btn primary login-submit">登录</button>
        </form>
    </div>
</div>
<script>
    const message = document.getElementById('login-message');
    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === 'true') {
        message.textContent = '用户名或密码错误';
        message.className = 'login-message error';
    } else if (params.get('logout') === 'true') {
        message.textContent = '已安全退出';
        message.className = 'login-message success';
    }
</script>
</body>
</html>
