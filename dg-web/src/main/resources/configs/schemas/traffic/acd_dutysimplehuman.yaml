# 简易事故人员表（对应 ods_jjlhy_acd_dutysimplehuman_di_simple.csv）
table: acd_dutysimplehuman
fields:
  - name: sgbh
    type: VARCHAR
    generator: { strategy: reference, source: acd_dutysimple, field: sgbh }
  - name: xzqh
    type: VARCHAR
    generator: { strategy: enum, values: ["440115"] }
  - name: rybh
    type: VARCHAR
    generator: { strategy: sequence, start: 1, step: 1 }
  - name: xm
    type: VARCHAR
    generator:
      strategy: enum
      values: ["王伟", "李芳", "张娜", "刘秀英", "陈敏", "杨静", "赵强", "黄磊"]
  - name: xb
    type: VARCHAR
    generator: { strategy: enum, values: ["1", "2"] }
  - name: sfzmhm
    type: VARCHAR
    generator: { strategy: regex, pattern: "440115[0-9]{4}(0[1-9]|1[0-2])(0[1-9]|[12][0-9]|3[01])[0-9]{3}[0-9X]" }
  - name: dh
    type: VARCHAR
    generator: { strategy: regex, pattern: "1[3-9][0-9]{9}" }
  - name: nl
    type: VARCHAR
    generator: { strategy: random, type: int, min: 18, max: 70 }
  - name: hphm
    type: VARCHAR
    generator: { strategy: regex, pattern: "[京津沪渝冀豫云辽黑湘皖鲁苏浙赣鄂粤][A-Z][A-Z0-9]{5}" }
  - name: hpzl
    type: VARCHAR
    generator: { strategy: enum, values: ["01", "02", "15", "16"] }
  - name: clpp
    type: VARCHAR
    generator:
      strategy: enum
      values: ["大众牌", "丰田牌", "本田牌", "别克牌", "比亚迪牌", "吉利牌"]
  - name: sgzr
    type: VARCHAR
    generator: { strategy: random, type: int, min: 1, max: 5 }
  - name: my_dt
    type: VARCHAR
    generator: { strategy: enum, values: ["2023-06-26 00:00:00.000"] }
