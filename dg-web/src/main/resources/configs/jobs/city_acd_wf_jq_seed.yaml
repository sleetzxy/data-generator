# 事故/违法/警情联合造数任务（对应 export_city_acd_wf_join_masked.py 默认参数）
# 城市编码 440115，时间范围 2023-01-01 ~ 2023-12-31
job: city_acd_wf_jq_seed
tables:
  - name: acd_file
    schema: schemas/traffic/acd_file.yaml
    count: 50

  - name: acd_filehuman
    schema: schemas/traffic/acd_filehuman.yaml
    count: 100
    constraints: constraints/traffic/acd_filehuman_fk.yaml
    depends_on: [acd_file]

  - name: acd_dutysimple
    schema: schemas/traffic/acd_dutysimple.yaml
    count: 50

  - name: acd_dutysimplehuman
    schema: schemas/traffic/acd_dutysimplehuman.yaml
    count: 100
    constraints: constraints/traffic/acd_dutysimplehuman_fk.yaml
    depends_on: [acd_dutysimple]

  - name: wf_3y
    schema: schemas/traffic/wf_3y.yaml
    count: 100

  - name: jqxx
    schema: schemas/traffic/jqxx.yaml
    count: 200
