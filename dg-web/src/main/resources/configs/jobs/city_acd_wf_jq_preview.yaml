- name: acd_filehuman
  count: 10
  writer:
    type: csv
    connection: traffic-output
    mode: insert
  depends_on:
  - acd_file
  schema:
    table: acd_filehuman
    fields:
    - name: sgbh
      type: VARCHAR
      generator: {strategy: reference, source: acd_file, field: sgbh}
    - name: xzqh
      type: VARCHAR
      generator: {strategy: reference, source: acd_file, field: xzqh}
    - name: rybh
      type: VARCHAR
      generator: {strategy: sequence, start: 1, step: 1}
    - name: xm
      type: VARCHAR
      generator: {strategy: enum, values: [王伟, 李芳, 张娜, 刘秀英, 陈敏, 杨静, 赵强, 黄磊]}
    - name: xb
      type: VARCHAR
      generator: {strategy: enum, values: ['1', '2']}
    - name: sfzmhm
      type: VARCHAR
      generator: {strategy: regex, pattern: '440115[0-9]{4}(0[1-9]|1[0-2])(0[1-9]|[12][0-9]|3[01])[0-9]{3}[0-9X]'}
    - name: dh
      type: VARCHAR
      generator: {strategy: regex, pattern: '1[3-9][0-9]{9}'}
    - name: nl
      type: VARCHAR
      generator: {strategy: random, type: int, min: 18, max: 70}
    - name: hphm
      type: VARCHAR
      generator: {strategy: enum, values: ['', 粤A12345, 粤A67890, 粤B1D2E3, 粤C5F6G7, 粤AD12345, 粤AF67890]}
    - name: hpzl
      type: VARCHAR
      generator: {strategy: enum, values: ['01', '02', '07', '15', '16', '51']}
    - name: clpp
      type: VARCHAR
      generator: {strategy: enum, values: [大众牌, 丰田牌, 本田牌, 别克牌, 比亚迪牌, 吉利牌, 雅迪牌, 爱玛牌, '']}
    - name: sgzr
      type: VARCHAR
      generator: {strategy: random, type: int, min: 1, max: 5}
    - name: jtfs
      type: VARCHAR
      generator: {strategy: enum, values: [K3, K31, K33, H1, H2, F1, F2, F6, A1]}
    - name: sfdsr
      type: VARCHAR
      generator: {strategy: enum, values: ['1', '0']}
    - name: my_dt
      type: VARCHAR
      generator: {strategy: enum, values: ['2024-06-26 00:00:00.000']}
  constraints:
  - level: field
    field: sgbh
    type: foreign_key
    ref_table: acd_file
    ref_field: sgbh
